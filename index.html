<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfil - Destacadas Estilo Instagram</title>
    <style>
        /* Estilos Base */
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #fff;
            margin: 0;
            display: flex;
            justify-content: center;
        }

        .profile-container {
            width: 100%;
            max-width: 500px;
            padding: 20px;
        }

        /* Contenedor de Destacadas */
        .highlights-section {
            display: flex;
            gap: 15px;
            overflow-x: auto;
            padding: 10px 5px;
            scrollbar-width: none; /* Ocultar scroll en Firefox */
        }

        .highlights-section::-webkit-scrollbar {
            display: none; /* Ocultar scroll en Chrome/Safari */
        }

        .highlight-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            min-width: 75px;
            cursor: pointer;
            transition: transform 0.1s active;
        }

        .highlight-item:active {
            transform: scale(0.95);
        }

        /* El círculo de la foto */
        .circle-wrapper {
            width: 64px;
            height: 64px;
            border-radius: 50%;
            border: 1px solid #dbdbdb;
            padding: 3px;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #fff;
            margin-bottom: 4px;
        }

        .circle-inner {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background-color: #fafafa;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .circle-inner img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .add-icon {
            font-size: 28px;
            font-weight: 200;
            color: #262626;
        }

        /* Texto de la destacada */
        .highlight-name {
            font-size: 12px;
            color: #262626;
            max-width: 75px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            text-align: center;
            margin: 0;
        }

        /* Inputs ocultos */
        #file-input { display: none; }
    </style>
</head>
<body>

<div class="profile-container">
    
    <div class="highlights-section" id="highlights-container">
        
        <div class="highlight-item" onclick="triggerNewHighlight()">
            <div class="circle-wrapper">
                <div class="circle-inner">
                    <span class="add-icon">+</span>
                </div>
            </div>
            <p class="highlight-name">Nueva</p>
        </div>

        <div id="highlights-list" style="display: flex; gap: 15px;"></div>

    </div>
</div>

<input type="file" id="file-input" accept="image/*">

<script>
    const highlightsList = document.getElementById('highlights-list');
    const fileInput = document.getElementById('file-input');
    let currentEditingItem = null;

    // Función para crear una nueva destacada
    function triggerNewHighlight() {
        const name = prompt("Nombre de la destacada:");
        if (!name) return;

        // Pedir imagen
        fileInput.onchange = (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (event) => {
                    createHighlightElement(name, event.target.result);
                };
                reader.readAsDataURL(file);
            }
        };
        fileInput.click();
    }

    // Función para renderizar el elemento en el DOM
    function createHighlightElement(name, imgSrc) {
        const div = document.createElement('div');
        div.className = 'highlight-item';
        
        // Al hacer clic en una existente, permite editarla o eliminarla
        div.onclick = function() {
            manageHighlight(this);
        };

        div.innerHTML = `
            <div class="circle-wrapper">
                <div class="circle-inner">
                    <img src="${imgSrc}" alt="cover">
                </div>
            </div>
            <p class="highlight-name">${name}</p>
        `;
        
        highlightsList.appendChild(div);
    }

    // Función para editar nombre o borrar
    function manageHighlight(element) {
        const currentName = element.querySelector('.highlight-name').innerText;
        const action = confirm(`¿Qué quieres hacer con "${currentName}"?\n\nAceptar para EDITAR NOMBRE\nCancelar para ELIMINAR`);

        if (action) {
            const newName = prompt("Nuevo nombre:", currentName);
            if (newName) {
                element.querySelector('.highlight-name').innerText = newName;
            }
        } else {
            const confirmDelete = confirm("¿Seguro que quieres borrar esta destacada?");
            if (confirmDelete) {
                element.remove();
            }
        }
    }
</script>

</body>
</html>
