<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meetly - Match & Social</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --bg-color: #ffd1dc; /* Rosa Pastel */
            --match-bg: #800000; /* Granate */
            --primary: #ff5e78;
            --white: #ffffff;
            --text: #333333;
            --gray: #f0f0f0;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }

        body {
            background-color: var(--bg-color);
            color: var(--text);
            transition: background-color 0.8s ease; /* Transición suave al granate */
            height: 100vh;
            display: flex;
            justify-content: center;
            overflow: hidden;
        }

        /* Contenedor tipo Móvil */
        #app-container {
            width: 100%;
            max-width: 450px;
            background: var(--white);
            height: 100%;
            display: flex;
            flex-direction: column;
            position: relative;
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
        }

        /* Pantallas (Views) */
        .view {
            flex: 1;
            display: none; /* Oculto por defecto */
            overflow-y: auto;
            padding: 20px;
            padding-bottom: 70px; /* Espacio para navbar */
        }

        .view.active { display: flex; flex-direction: column; }

        /* AUTH (Login/Register) */
        #auth-view { justify-content: center; align-items: center; text-align: center; }
        input {
            width: 100%; padding: 12px; margin: 10px 0;
            border: 1px solid #ddd; border-radius: 8px; outline: none;
        }
        button {
            width: 100%; padding: 12px; background: var(--primary);
            color: white; border: none; border-radius: 8px;
            cursor: pointer; font-weight: bold; font-size: 16px;
        }
        .toggle-auth { color: var(--primary); cursor: pointer; margin-top: 10px; font-size: 0.9rem; }

        /* NAVBAR */
        .navbar {
            position: absolute; bottom: 0; width: 100%;
            height: 60px; background: white; border-top: 1px solid #eee;
            display: flex; justify-content: space-around; align-items: center;
            z-index: 100;
        }
        .nav-item { font-size: 24px; color: #ccc; cursor: pointer; }
        .nav-item.active { color: var(--primary); }

        /* PERFIL (Instagram Style) */
        .profile-header { display: flex; align-items: center; margin-bottom: 20px; }
        .profile-pic {
            width: 80px; height: 80px; border-radius: 50%; object-fit: cover;
            border: 3px solid var(--primary); margin-right: 20px;
        }
        .stats { display: flex; gap: 15px; text-align: center; }
        .stat-box strong { display: block; font-size: 18px; }
        .stat-box span { font-size: 12px; color: #888; }
        
        .highlights { display: flex; gap: 10px; overflow-x: auto; margin-bottom: 20px; padding-bottom: 10px; }
        .highlight-circle {
            min-width: 60px; height: 60px; border-radius: 50%; background: #eee;
            border: 2px solid var(--primary); display: flex; align-items: center; justify-content: center;
        }

        .posts-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 2px; }
        .post-img { width: 100%; aspect-ratio: 1/1; object-fit: cover; background: #eee; }

        /* SWIPE (Tinder Style) */
        #swipe-view { align-items: center; justify-content: center; position: relative; }
        .card-stack { width: 100%; height: 70%; position: relative; }
        .card {
            width: 100%; height: 100%; border-radius: 20px; overflow: hidden;
            position: absolute; background: white; box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            display: flex; flex-direction: column;
        }
        .card img { width: 100%; height: 75%; object-fit: cover; }
        .card-info { padding: 15px; height: 25%; }
        
        .action-buttons {
            display: flex; gap: 20px; margin-top: 20px; width: 100%; justify-content: center;
        }
        .action-btn {
            width: 60px; height: 60px; border-radius: 50%; border: none;
            font-size: 24px; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            transition: transform 0.2s;
        }
        .btn-pass { background: white; color: #ff4b4b; border: 2px solid #ff4b4b; } /* Izquierda */
        .btn-match { background: white; color: #4bffb5; border: 2px solid #4bffb5; } /* Derecha */
        .action-btn:active { transform: scale(0.9); }

        /* CHAT LIST */
        .chat-item {
            display: flex; align-items: center; padding: 15px; border-bottom: 1px solid #eee; cursor: pointer;
        }
        .chat-avatar { width: 50px; height: 50px; border-radius: 50%; margin-right: 15px; background: #ccc; }
        .chat-info { flex: 1; }
        .streak { color: orange; font-weight: bold; font-size: 14px; }

        /* MENSAJES */
        #conversation-view { padding-bottom: 70px; background: #fff; z-index: 200; position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: none; flex-direction: column; }
        .chat-header { padding: 15px; border-bottom: 1px solid #eee; display: flex; align-items: center; background: white;}
        .back-btn { margin-right: 15px; font-size: 20px; cursor: pointer; }
        .messages-area { flex: 1; padding: 15px; overflow-y: auto; background: #f9f9f9; display: flex; flex-direction: column; gap: 10px;}
        .message { max-width: 70%; padding: 10px 15px; border-radius: 15px; font-size: 14px; }
        .msg-me { align-self: flex-end; background: var(--primary); color: white; border-bottom-right-radius: 2px; }
        .msg-them { align-self: flex-start; background: #eee; color: #333; border-bottom-left-radius: 2px; }
        .input-area { padding: 10px; border-top: 1px solid #eee; display: flex; gap: 10px; background: white;}

        /* Efecto Match */
        .match-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(128, 0, 0, 0.9); z-index: 999;
            display: none; justify-content: center; align-items: center; flex-direction: column;
            color: white; text-align: center;
        }
        .match-overlay.active { display: flex; animation: fadeIn 0.5s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

    </style>
</head>
<body>

    <div id="match-overlay" class="match-overlay">
        <h1>¡Es un Match!</h1>
        <p>Ahora podéis chatear</p>
        <button onclick="closeMatchOverlay()" style="width: 200px; margin-top: 20px; background: white; color: maroon;">Seguir</button>
    </div>

    <div id="app-container">
        
        <div id="auth-view" class="view active">
            <h1 style="color: var(--primary); margin-bottom: 20px;">Meetly</h1>
            <input type="text" id="reg-name" placeholder="Nombre completo" style="display: none;">
            <input type="email" id="email" placeholder="Email">
            <input type="password" id="password" placeholder="Contraseña">
            <button id="auth-btn" onclick="handleAuth()">Iniciar Sesión</button>
            <p class="toggle-auth" onclick="toggleAuthMode()">¿No tienes cuenta? Regístrate</p>
        </div>

        <div id="swipe-view" class="view">
            <h2 style="margin-bottom: 10px; color: #888;">Descubrir</h2>
            <div id="card-container" class="card-stack">
                <div style="text-align: center; margin-top: 50%;">No hay más perfiles :(</div>
            </div>
            <div class="action-buttons">
                <button class="action-btn btn-pass" onclick="handleSwipe('pass')"><i class="fas fa-times"></i></button>
                <button class="action-btn btn-match" onclick="handleSwipe('like')"><i class="fas fa-heart"></i></button>
            </div>
        </div>

        <div id="chat-list-view" class="view">
            <h2>Mensajes</h2>
            <div id="matches-list">
                </div>
        </div>

        <div id="profile-view" class="view">
            <div class="profile-header">
                <img src="https://via.placeholder.com/150" id="profile-img" class="profile-pic">
                <div class="stats">
                    <div class="stat-box"><strong id="p-posts">0</strong><span>Posts</span></div>
                    <div class="stat-box"><strong id="p-followers">0</strong><span>Seguidores</span></div>
                    <div class="stat-box"><strong id="p-following">0</strong><span>Seguidos</span></div>
                </div>
            </div>
            <h3 id="profile-name">Usuario</h3>
            <p id="profile-bio" style="margin-bottom: 15px; color: #666;">Sin biografía.</p>
            
            <div class="highlights">
                <div class="highlight-circle"><i class="fas fa-star"></i></div>
                <div class="highlight-circle"><i class="fas fa-heart"></i></div>
                <div class="highlight-circle"><i class="fas fa-music"></i></div>
                <div class="highlight-circle"><i class="fas fa-plane"></i></div>
            </div>

            <div class="posts-grid" id="profile-grid">
                </div>
            <button onclick="logout()" style="margin-top: 20px; background: #ddd; color: #333;">Cerrar Sesión</button>
        </div>

        <div id="conversation-view">
            <div class="chat-header">
                <i class="fas fa-arrow-left back-btn" onclick="closeChat()"></i>
                <h3 id="chat-user-name">Nombre</h3>
            </div>
            <div id="messages-container" class="messages-area"></div>
            <div class="input-area">
                <input type="text" id="msg-input" placeholder="Escribe un mensaje..." style="margin:0;">
                <button onclick="sendMessage()" style="width: 50px; margin:0;"><i class="fas fa-paper-plane"></i></button>
            </div>
        </div>

        <div class="navbar" id="main-nav" style="display: none;">
            <i class="fas fa-home nav-item" onclick="navTo('swipe-view')"></i> <i class="fas fa-search nav-item"></i> <i class="fas fa-comment nav-item" onclick="navTo('chat-list-view')"></i> <i class="fas fa-user nav-item" onclick="navTo('profile-view')"></i> </div>

    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, signOut, updateProfile } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-auth.js";
        import { getDatabase, ref, set, push, onValue, get, update, child } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCnacFrX45poWxbECXN6F1Dxn1VDbHeDs4",
            authDomain: "meetly-43fb0.firebaseapp.com",
            databaseURL: "https://meetly-43fb0-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "meetly-43fb0",
            storageBucket: "meetly-43fb0.firebasestorage.app",
            messagingSenderId: "175527440295",
            appId: "1:175527440295:web:f5aea71bf0d1668e825082"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);

        let currentUser = null;
        let potentialMatches = [];
        let currentCardIndex = 0;
        let activeChatId = null;

        // --- AUTH LOGIC ---
        let isRegistering = false;
        
        window.toggleAuthMode = () => {
            isRegistering = !isRegistering;
            document.getElementById('reg-name').style.display = isRegistering ? 'block' : 'none';
            document.getElementById('auth-btn').innerText = isRegistering ? 'Registrarse' : 'Iniciar Sesión';
            document.querySelector('.toggle-auth').innerText = isRegistering ? '¿Ya tienes cuenta? Inicia sesión' : '¿No tienes cuenta? Regístrate';
        }

        window.handleAuth = async () => {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const name = document.getElementById('reg-name').value;

            try {
                if (isRegistering) {
                    const userCredential = await createUserWithEmailAndPassword(auth, email, password);
                    const user = userCredential.user;
                    // Guardar datos básicos en DB
                    await set(ref(db, 'users/' + user.uid), {
                        name: name,
                        email: email,
                        bio: "Hola, soy nuevo en Meetly.",
                        photo: `https://api.dicebear.com/7.x/avataaars/svg?seed=${user.uid}`, // Avatar random
                        followers: 0,
                        following: 0,
                        streak: 0
                    });
                    // Crear posts dummy
                    for(let i=0; i<6; i++) {
                        push(ref(db, 'users/' + user.uid + '/posts'), {
                            img: `https://picsum.photos/200?random=${i}`
                        });
                    }
                } else {
                    await signInWithEmailAndPassword(auth, email, password);
                }
            } catch (error) {
                alert(error.message);
            }
        };

        window.logout = () => signOut(auth);

        onAuthStateChanged(auth, (user) => {
            if (user) {
                currentUser = user;
                document.getElementById('auth-view').classList.remove('active');
                document.getElementById('main-nav').style.display = 'flex';
                navTo('swipe-view');
                loadProfile();
                loadCards();
                loadMatches();
            } else {
                currentUser = null;
                showView('auth-view');
                document.getElementById('main-nav').style.display = 'none';
            }
        });

        // --- NAVIGATION ---
        window.navTo = (viewId) => {
            // Reset background color al navegar
            document.body.style.backgroundColor = "var(--bg-color)"; 
            
            showView(viewId);
            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
            // Highlighting logic simple
            if(viewId === 'swipe-view') document.querySelectorAll('.nav-item')[0].classList.add('active');
            if(viewId === 'chat-list-view') document.querySelectorAll('.nav-item')[2].classList.add('active');
            if(viewId === 'profile-view') document.querySelectorAll('.nav-item')[3].classList.add('active');
        }

        function showView(viewId) {
            document.querySelectorAll('.view').forEach(el => el.classList.remove('active'));
            document.getElementById(viewId).classList.add('active');
        }

        // --- PROFILE LOGIC ---
        function loadProfile() {
            const userRef = ref(db, 'users/' + currentUser.uid);
            onValue(userRef, (snapshot) => {
                const data = snapshot.val();
                if(!data) return;

                document.getElementById('profile-name').innerText = data.name;
                document.getElementById('profile-bio').innerText = data.bio;
                document.getElementById('profile-img').src = data.photo;
                document.getElementById('p-followers').innerText = data.followers;
                document.getElementById('p-following').innerText = data.following;

                // Load Posts
                const grid = document.getElementById('profile-grid');
                grid.innerHTML = '';
                if(data.posts) {
                    Object.values(data.posts).forEach(post => {
                        const img = document.createElement('img');
                        img.src = post.img;
                        img.className = 'post-img';
                        grid.appendChild(img);
                    });
                    document.getElementById('p-posts').innerText = Object.keys(data.posts).length;
                }
            });
        }

        // --- SWIPE LOGIC ---
        async function loadCards() {
            const usersRef = ref(db, 'users');
            const snapshot = await get(usersRef);
            const allUsers = snapshot.val();
            
            // Obtener swipes previos
            const swipesSnapshot = await get(ref(db, `swipes/${currentUser.uid}`));
            const mySwipes = swipesSnapshot.val() || {};

            potentialMatches = [];
            if (allUsers) {
                Object.keys(allUsers).forEach(uid => {
                    if (uid !== currentUser.uid && !mySwipes[uid]) {
                        potentialMatches.push({ uid, ...allUsers[uid] });
                    }
                });
            }
            currentCardIndex = 0;
            renderCard();
        }

        function renderCard() {
            const container = document.getElementById('card-container');
            container.innerHTML = '';

            if (currentCardIndex < potentialMatches.length) {
                const user = potentialMatches[currentCardIndex];
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <img src="${user.photo}" alt="${user.name}">
                    <div class="card-info">
                        <h2>${user.name}</h2>
                        <p>${user.bio}</p>
                    </div>
                `;
                container.appendChild(card);
            } else {
                container.innerHTML = '<div style="text-align: center; margin-top: 50%;">No hay más perfiles nuevos.<br>¡Invita amigos!</div>';
            }
        }

        window.handleSwipe = async (action) => {
            if (currentCardIndex >= potentialMatches.length) return;

            const targetUser = potentialMatches[currentCardIndex];
            
            // Guardar Swipe
            await set(ref(db, `swipes/${currentUser.uid}/${targetUser.uid}`), action);

            if (action === 'like') {
                // Chequear Match
                const checkMatchRef = ref(db, `swipes/${targetUser.uid}/${currentUser.uid}`);
                const snapshot = await get(checkMatchRef);
                if (snapshot.val() === 'like') {
                    triggerMatch(targetUser);
                }
            }

            currentCardIndex++;
            renderCard();
        }

        async function triggerMatch(targetUser) {
            // Cambiar color de fondo a Granate
            document.body.style.backgroundColor = "var(--match-bg)";
            
            // Mostrar Overlay
            document.getElementById('match-overlay').classList.add('active');

            // Crear Match en DB para ambos
            const chatId = [currentUser.uid, targetUser.uid].sort().join('_');
            
            const matchData = { timestamp: Date.now(), streak: 0 };
            await update(ref(db), {
                [`matches/${currentUser.uid}/${targetUser.uid}`]: matchData,
                [`matches/${targetUser.uid}/${currentUser.uid}`]: matchData
            });
        }

        window.closeMatchOverlay = () => {
            document.getElementById('match-overlay').classList.remove('active');
            // Volver a rosa pastel despues
            setTimeout(() => {
                document.body.style.backgroundColor = "var(--bg-color)";
            }, 500);
        }

        // --- CHAT LOGIC ---
        function loadMatches() {
            const matchesRef = ref(db, `matches/${currentUser.uid}`);
            onValue(matchesRef, async (snapshot) => {
                const matches = snapshot.val();
                const list = document.getElementById('matches-list');
                list.innerHTML = '';

                if (!matches) {
                    list.innerHTML = '<p style="padding:20px; text-align:center">Aún no tienes matches.</p>';
                    return;
                }

                for (const uid of Object.keys(matches)) {
                    // Fetch user info
                    const userSnap = await get(ref(db, `users/${uid}`));
                    const userData = userSnap.val();
                    const streak = matches[uid].streak || 0;

                    const div = document.createElement('div');
                    div.className = 'chat-item';
                    div.innerHTML = `
                        <img src="${userData.photo}" class="chat-avatar">
                        <div class="chat-info">
                            <h4>${userData.name}</h4>
                            <span style="font-size:12px; color:#888">Toca para chatear</span>
                        </div>
                        ${streak > 0 ? `<div class="streak">🔥 ${streak}</div>` : ''}
                    `;
                    div.onclick = () => openChat(uid, userData.name);
                    list.appendChild(div);
                }
            });
        }

        window.openChat = (uid, name) => {
            activeChatId = [currentUser.uid, uid].sort().join('_');
            document.getElementById('chat-user-name').innerText = name;
            document.getElementById('conversation-view').style.display = 'flex';
            document.getElementById('conversation-view').style.zIndex = '200';
            
            loadMessages();
        }

        window.closeChat = () => {
            document.getElementById('conversation-view').style.display = 'none';
            activeChatId = null;
        }

        function loadMessages() {
            if(!activeChatId) return;
            const msgsRef = ref(db, `messages/${activeChatId}`);
            
            onValue(msgsRef, (snapshot) => {
                const container = document.getElementById('messages-container');
                container.innerHTML = '';
                const data = snapshot.val();
                if(data) {
                    Object.values(data).forEach(msg => {
                        const div = document.createElement('div');
                        div.className = `message ${msg.sender === currentUser.uid ? 'msg-me' : 'msg-them'}`;
                        div.innerText = msg.text;
                        container.appendChild(div);
                    });
                    container.scrollTop = container.scrollHeight;
                }
            });
        }

        window.sendMessage = () => {
            const input = document.getElementById('msg-input');
            const text = input.value.trim();
            if(!text || !activeChatId) return;

            push(ref(db, `messages/${activeChatId}`), {
                sender: currentUser.uid,
                text: text,
                timestamp: Date.now()
            });
            input.value = '';
        }

    </script>
</body>
</html>
