<style>
  /* Esto asegura que el bloqueo cubra todo y esté siempre encima */
  #overlay-migracion-total {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background-color: rgba(0, 0, 0, 0.95); /* Fondo casi negro para tapar todo */
    z-index: 9999999; /* Un número muy alto para estar encima de todo */
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: system-ui, -apple-system, sans-serif;
    backdrop-filter: blur(5px); /* Efecto borroso opcional para el fondo */
  }

  /* Diseño de la tarjeta central */
  .tarjeta-aviso {
    background-color: #ffffff;
    padding: 40px;
    border-radius: 16px;
    box-shadow: 0 20px 50px rgba(0,0,0,0.5);
    text-align: center;
    max-width: 400px;
    width: 90%;
    animation: aparecer 0.3s ease-out;
  }

  .tarjeta-aviso h1 {
    margin-top: 0;
    color: #1a1a1a;
    font-size: 24px;
    margin-bottom: 10px;
  }

  .tarjeta-aviso p {
    color: #666;
    margin-bottom: 30px;
    line-height: 1.5;
  }

  /* Diseño del botón */
  .boton-migrar {
    background-color: #000000;
    color: white;
    text-decoration: none;
    padding: 12px 30px;
    border-radius: 8px;
    font-weight: bold;
    font-size: 16px;
    display: inline-block;
    transition: transform 0.2s, background-color 0.2s;
    border: none;
    cursor: pointer;
  }

  .boton-migrar:hover {
    background-color: #333333;
    transform: scale(1.05);
  }

  /* Animación suave de entrada */
  @keyframes aparecer {
    from { transform: scale(0.9); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
  }
</style>

<div id="overlay-migracion-total">
  <div class="tarjeta-aviso">
    <h1>Meetly ahora es UnClick</h1>
    <p>Esta versión ha dejado de funcionar. Para continuar utilizando la plataforma, es necesario migrar a la nueva versión.</p>
    
    <a href="https://un-click.vercel.app" class="boton-migrar">
      Migrar ahora
    </a>
  </div>
</div>
